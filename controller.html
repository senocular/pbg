<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Controller</title>
        <link rel="stylesheet" href="styles/common.css" />
        <link rel="stylesheet" href="styles/controller.css" />
        <script src="./src/apps/controller/index.js" type="module"></script>
    </head>
    <body>
        <p>
            Virtual gamepad capable of capturing inputs from mouse clicks (SHIFT (<kbd>⇧</kbd>) to lock), keyboard keys,
            or game controllers (tested with Xbox One controller).
        </p>
        <p id="options">
            <label>
                Keyboard mapping:
                <select id="kbd-mapping-select"></select>
            </label>
            <br />
            <label> <input type="checkbox" id="layout-face-check" /> 4 face buttons </label>
            <br />
            <label> <input type="checkbox" id="layout-shoulder-check" /> 4 shoulder buttons </label>
        </p>
        <pbg-controller></pbg-controller>
        <p>
            <textarea></textarea>
        </p>
    </body>
</html>
